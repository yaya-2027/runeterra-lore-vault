<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synweft</title>
  <!-- IBM Plex Sans + JetBrains Mono — recommandés par UI/UX Pro Max pour les outils dev -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script src="https://unpkg.com/webcola/WebCola/cola.js"></script>
  <script src="https://unpkg.com/cytoscape-cola/cytoscape-cola.js"></script>
</head>
<body>

  <!-- ── Toolbar ── -->
  <header class="toolbar">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <circle cx="10" cy="10" r="2" fill="currentColor" opacity="0.6"/>
        <line x1="10" y1="8" x2="10" y2="4" stroke="currentColor" stroke-width="1" opacity="0.4"/>
      </svg>
      <span class="logo-text">Synweft</span>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.2"/>
        <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input id="search-input" class="search-input" type="text" placeholder="Rechercher une note…" autocomplete="off" />
      <button id="search-clear" class="search-clear" title="Effacer">
        <svg viewBox="0 0 12 12" fill="none"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="toolbar-right">
      <button id="btn-save" class="btn btn-ghost">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 2h8l3 3v9H2V2h1zm4 9a2 2 0 100-4 2 2 0 000 4zm3-9v3H5V2h5z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg>
        Snapshot
      </button>
      <div class="select-wrap">
        <select id="snapshot-select" class="select">
          <option value="">Snapshots…</option>
        </select>
      </div>
      <button id="btn-load" class="btn btn-ghost">Charger</button>
      <button id="btn-live" class="btn btn-warning" style="display:none">
        <span class="dot-pulse"></span> Live
      </button>
      <span id="readonly-badge" class="badge" style="display:none">Lecture seule</span>
    </div>
  </header>

  <!-- ── Barre de filtres ── -->
  <div class="filter-bar">
    <span class="filter-sep">Afficher</span>

    <label class="chip">
      <input type="checkbox" id="filter-ghosts" checked />
      <span>Fantômes</span>
    </label>

    <label class="chip">
      <input type="checkbox" id="filter-tags" checked />
      <span>Tags</span>
    </label>

    <label class="chip">
      <input type="checkbox" id="filter-directions" />
      <span>Directions</span>
    </label>

    <div class="filter-degree">
      <span class="filter-sep">Min. liens</span>
      <input type="range" id="filter-degree-range" min="0" max="20" value="0" />
      <span id="filter-degree-val" class="degree-val">0</span>
    </div>
  </div>

  <!-- ── Layout principal ── -->
  <main class="layout">
    <div id="cy"></div>

    <!-- Panneau latéral -->
    <aside id="side-panel" class="panel">
      <div class="panel-header">
        <span class="panel-title">Ghost Notes</span>
        <button id="btn-toggle-panel" class="btn-icon" title="Réduire">
          <svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- Mini stats -->
      <div id="panel-stats" class="panel-stats">
        <div class="stat">
          <span id="stat-nodes" class="stat-val">—</span>
          <span class="stat-lbl">notes</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span id="stat-edges" class="stat-val">—</span>
          <span class="stat-lbl">liens</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span id="stat-ghosts" class="stat-val">—</span>
          <span class="stat-lbl">fantômes</span>
        </div>
      </div>

      <ul id="ghost-list" class="ghost-list"></ul>
    </aside>
  </main>

  <!-- ── Barre de statut ── -->
  <footer class="status-bar">
    <span id="info-nodes">0 nœuds</span>
    <span class="sep">·</span>
    <span id="info-edges">0 liens</span>
    <span class="sep">·</span>
    <span id="info-ghosts">0 fantômes</span>
    <span class="sep">·</span>
    <span id="info-tags">0 tags</span>
    <span class="status-hint">Clic = focus · Clic fond = reset · Scroll = zoom</span>
    <span id="live-indicator" class="live-dot"></span>
  </footer>

  <!-- Tooltip flottant (apparaît au survol d'un nœud) -->
  <div id="node-tooltip" class="node-tooltip">
    <span id="tooltip-name" class="tooltip-name"></span>
    <span id="tooltip-meta" class="tooltip-meta"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
